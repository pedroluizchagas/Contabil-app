# Configuração do Supabase CLI para desenvolvimento local.
# Referência: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:1420", "http://localhost:1421"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Onboarding FECHADO: não há cadastro público. Os usuários (contador, empresa,
# funcionário) são provisionados pelo Admin via service role. Mantenha false.
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

# Custom JWT Hook: injeta tenant_id, user_role, empresa_id e funcionario_id
# A função é criada pela migration 0007.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[analytics]
enabled = false

# O Stripe não envia JWT do Supabase — a autenticidade vem da assinatura do
# webhook (Stripe-Signature). As demais funções usam verify_jwt padrão.
[functions.stripe-webhook]
verify_jwt = false
